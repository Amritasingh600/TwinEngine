# ==============================================================
# TwinEngine — CI Pipeline (Test + Lint on every push/PR)
# ==============================================================

name: CI — Test & Lint

on:
  push:
    branches: [main, develop]
    paths:
      - "twin_engine_backend/**"
  pull_request:
    branches: [main]
    paths:
      - "twin_engine_backend/**"

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIR: twin_engine_backend

defaults:
  run:
    working-directory: twin_engine_backend

jobs:
  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        env:
          SECRET_KEY: ci-test-key-not-for-production
          DATABASE_URL: sqlite:///db.sqlite3
          DEBUG: "True"
        run: python manage.py check

  # ── Test ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: twinengine_test
          POSTGRES_USER: twinengine
          POSTGRES_PASSWORD: testpass123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-key-not-for-production
      DATABASE_URL: postgresql://twinengine:testpass123@localhost:5432/twinengine_test
      REDIS_URL: redis://localhost:6379/0
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: twinengine_core.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.WORKING_DIR }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: python manage.py test --verbosity=2 --parallel

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate --fail-on-warn --file /dev/null

  # ── Docker Build (verify Dockerfile builds) ────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          push: false
          tags: twinengine:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
