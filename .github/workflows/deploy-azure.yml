# ==============================================================
# TwinEngine — Azure Deployment Pipeline
# Build Docker image → Push to ACR → Deploy to App Service
# ==============================================================
# Required GitHub Secrets:
#   AZURE_CREDENTIALS        — Service principal JSON (az ad sp create-for-rbac)
#   ACR_LOGIN_SERVER          — e.g. twinengineacr.azurecr.io
#   ACR_USERNAME              — ACR admin username
#   ACR_PASSWORD              — ACR admin password
#   AZURE_WEBAPP_NAME         — App Service name (e.g. twinengine-api-xxxxx)
#   AZURE_RESOURCE_GROUP      — Resource group name
# ==============================================================

name: Deploy → Azure

on:
  push:
    branches: [main]
    paths:
      - "twin_engine_backend/**"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag"
        required: false
        default: "latest"

env:
  WORKING_DIR: twin_engine_backend
  IMAGE_NAME: twinengine

defaults:
  run:
    working-directory: twin_engine_backend

jobs:
  # ── Build & Push to ACR ────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag || 'latest' }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Azure App Service ────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag || 'latest' }}

      - name: Verify deployment health
        run: |
          echo "→ Waiting 30s for container startup..."
          sleep 30
          
          APP_URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "→ Checking health endpoint..."
          
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/health/" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deployment healthy! (HTTP ${HTTP_CODE})"
              echo "   API:  ${APP_URL}/api/"
              echo "   Docs: ${APP_URL}/api/docs/"
              exit 0
            fi
            echo "   Attempt ${i}/5: HTTP ${HTTP_CODE} — retrying in 15s..."
            sleep 15
          done
          
          echo "⚠️ Health check did not return 200 after 5 attempts."
          echo "   Check logs: az webapp log tail --name ${{ secrets.AZURE_WEBAPP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}"
          exit 1
